apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-stage
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/YC835/ArogoCD.git
    targetRevision: main
    path: charts/myapp

    helm:
      valueFiles:
        - ../../environments/stage-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: stage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
